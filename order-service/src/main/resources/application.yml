server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/order_db?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Spring Boot 启动时自动执行 schema.sql 建表，data.sql 插入初始数据
  # always: 每次启动都执行（开发环境用）；生产环境改为 never
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  jackson:
    serialization:
      write-dates-as-timestamps: false

rocketmq:
  name-server: localhost:9876   # WSL2 若连不上，改为 hostname -I 的输出 IP
  producer:
    group: order-producer-group
    send-msg-timeout: 3000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true   # order_no → orderNo 自动映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发期打印SQL

outbox:
  scheduler:
    interval: 15000   # Scheduler 轮询间隔(ms)，3秒一次，便于 demo 观察状态变化

